name: CI

on: pull_request

jobs:
    test:
        name: Test (default)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6.0.6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm test

    test-svelte-5:
        name: Test (latest Svelte 5)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6.0.6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Override Svelte version to 5
              run: pnpm install svelte@^5
            - name: Run tests with Svelte 5
              run: pnpm test

    test-prettier-latest:
        name: Test (Prettier 3.x latest)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6.0.6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Override Prettier to latest 3.x
              run: pnpm install prettier@^3
            - name: Run tests with latest Prettier 3.x
              run: pnpm test

    test-prettier-earliest:
        name: Test (Prettier 3.0.0)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6.0.6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Override Prettier to 3.0.0
              run: pnpm install prettier@3.0.0
            - name: Run tests with Prettier 3.0.0
              run: pnpm test

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6.0.6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run lint
              run: pnpm lint
